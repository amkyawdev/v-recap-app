<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Film Strip / Video Frame Design -->
  <rect x="18" y="22" width="64" height="56" rx="6" fill="none" stroke="#fff" stroke-width="4" stroke-opacity="0.9"/>
  
  <!-- Film Sprockets - Left -->
  <rect x="22" y="26" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="22" y="38" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="22" y="50" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="22" y="62" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  
  <!-- Film Sprockets - Right -->
  <rect x="74" y="26" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="74" y="38" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="74" y="50" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="74" y="62" width="4" height="6" rx="1" fill="#fff" opacity="0.8"/>
  
  <!-- Play Button -->
  <circle cx="50" cy="50" r="18" fill="url(#play)"/>
  <polygon points="45,42 45,58 60,50" fill="#fff" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
</svg>