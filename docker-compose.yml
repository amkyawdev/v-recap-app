# V Recap App - Docker Compose Configuration

version: '3.8'

services:
  # V Recap App - Production
  vrecap-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrecap-app
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # V Recap App - Development
  vrecap-dev:
    image: node:18-alpine
    container_name: vrecap-app-dev
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  node_modules: