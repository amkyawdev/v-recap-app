# V Recap App - Docker Compose Configuration

version: '3.8'

services:
  # V Recap App - Production
  vrecap-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrecap-app
    ports:
      - "3000:80"
    volumes:
      # Bind mount for development (uncomment for dev mode)
      # - ./dist:/usr/share/nginx/html:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # V Recap App - Development with FFmpeg
  vrecap-dev:
    image: node:18-alpine
    container_name: vrecap-app-dev
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      # Bind mount source code for hot reload
      - .:/app
      - /app/node_modules
      # Bind mount for FFmpeg WASM cache
      - ffmpeg-cache:/app/node_modules/.cache
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped

  # V Recap App - Production with bind mounts
  vrecap-prod:
    image: nginx:alpine
    container_name: vrecap-prod
    ports:
      - "8080:80"
    volumes:
      # Bind mount built files
      - ./dist:/usr/share/nginx/html:ro
      # Bind mount nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  ffmpeg-cache: